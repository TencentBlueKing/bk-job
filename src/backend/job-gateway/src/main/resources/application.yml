spring:
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive
  profiles:
    active: default
  # sleuth 配置已移除，迁移至 management.tracing
  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            ssl:
              use-insecure-trust-manager: true
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
server:
  shutdown: graceful
management:
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    # 使用spring cloud stream rabbitmq, 禁用掉springboot的rabbitmq health检查
    rabbit:
      enabled: false
  server:
    port: 19876
    ssl:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,configprops,env,beans,conditions,loggers,metrics,mappings,prometheus,scheduledtasks,info,refresh,busrefresh,bindings
      base-path: /actuator
    access:
      default: none
  endpoint:
    health:
      access: unrestricted
      show-details: when_authorized
      probes:
        enabled: true
    configprops:
      access: unrestricted
    env:
      access: unrestricted
    beans:
      access: unrestricted
    conditions:
      access: unrestricted
    loggers:
      access: unrestricted
    metrics:
      access: unrestricted
    mappings:
      access: unrestricted
    prometheus:
      access: unrestricted
    scheduledtasks:
      access: unrestricted
    info:
      access: unrestricted
    refresh:
      access: unrestricted
    busrefresh:
      access: unrestricted

job:
  gateway:
    login-exemption:
      enabled: false
      default-user: admin
      default-user-tenant-id: default
