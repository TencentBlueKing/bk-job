{{- if eq .Values.deploy.mode "lite" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "common.names.fullname" . }}-assemble
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: "job-assemble"
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
data:
  application.yaml: |-
    ## Spring 配置 ##
    spring:
      application:
        name: job-assemble
      profiles:
        active: prod
      servlet:
        multipart:
          max-file-size: 5GB
          max-request-size: 5GB
      cloud:
        stream:
          defaultBinder: jobCommon
          binders:
            jobCommon:
              type: rabbit
              environment:
                spring:
                  rabbitmq:
                    host: {{ include "job.rabbitmq.host" . }}
                    port: {{ include "job.rabbitmq.port" . }}
                    username: {{ include "job.rabbitmq.username" . }}
                    {{- if .Values.externalRabbitMQ.existingPasswordSecret }}
                    password: {{ .Values.externalRabbitMQ.existingPasswordKey | default "rabbitmq-password" | printf "${%s}" }}
                    {{- else }}
                    password: ${rabbitmq-password}
                    {{- end }}
                    virtual-host: {{ include "job.rabbitmq.vhost" . }}
          outputBindings: sendBackGroundTask
          source: task;step;gseTask;resultHandleTaskResume;notifyMsg;callback;crontabFanout;sendBackGroundTask;aiChatOperationFanout
          bindings:
            handleJobEvent-in-0:
              destination: task
              group: service.job.execute
              binder: jobCommon
              consumer:
                concurrency: 5
            task-out-0:
              destination: task
              group: service.job.execute
              binder: jobCommon
              consumer:
                concurrency: 5
            handleStepEvent-in-0:
              destination: step
              group: service.job.execute
              binder: jobCommon
              consumer:
                concurrency: 5
            step-out-0:
              destination: step
              group: service.job.execute
              binder: jobCommon
              consumer:
                concurrency: 5
            handleGseTaskEvent-in-0:
              destination: gse.task
              group: service.job.execute
              binder: jobCommon
              consumer:
                concurrency: 10
            gseTask-out-0:
              destination: gse.task
              group: service.job.execute
              binder: jobCommon
              consumer:
                concurrency: 10
            handleResultHandleResumeEvent-in-0:
              destination: result.handle.task.resume
              group: service.job.execute
              binder: jobCommon
              consumer:
                concurrency: 5
            resultHandleTaskResume-out-0:
              destination: result.handle.task.resume
              group: service.job.execute
              binder: jobCommon
              consumer:
                concurrency: 5
            handleNotifyMsg-in-0:
              destination: notify.msg
              group: service.job.execute
              binder: jobCommon
              consumer:
                concurrency: 5
            notifyMsg-out-0:
              destination: notify.msg
              group: service.job.execute
              binder: jobCommon
              consumer:
                concurrency: 5
            handleCallbackMsg-in-0:
              destination: task.callback
              group: service.job.execute
              binder: jobCommon
              consumer:
                concurrency: 5
            callback-out-0:
              destination: task.callback
              group: service.job.execute
              binder: jobCommon
              consumer:
                concurrency: 5
            handleCrontabFanoutEvent-in-0:
              destination: crontab.fanout
              binder: jobCommon
              consumer:
                concurrency: 5
            crontabFanout-out-0:
              destination: crontab.fanout
              binder: jobCommon
              consumer:
                concurrency: 5
            handleBackGroundTask-in-0:
              destination: backGroundTask
              group: service.job.manage
              binder: jobCommon
              consumer:
                concurrency: 1
            sendBackGroundTask-out-0:
              destination: backGroundTask
              group: service.job.manage
              binder: jobCommon
              consumer:
                concurrency: 1
            handleAIChatOperationEvent-in-0:
              destination: analysis.aiChatOperation.fanout
              binder: jobCommon
              consumer:
                concurrency: 3
            aiChatOperationFanout-out-0:
              destination: analysis.aiChatOperation.fanout
              binder: jobCommon
          rabbit:
            bindings:
              handleJobEvent-in-0:
                consumer:
                  maxConcurrency: 10
              task-out-0:
                consumer:
                  maxConcurrency: 10
              handleStepEvent-in-0:
                consumer:
                  maxConcurrency: 10
              step-out-0:
                consumer:
                  maxConcurrency: 10
              handleGseTaskEvent-in-0:
                consumer:
                  maxConcurrency: 20
              gseTask-out-0:
                consumer:
                  maxConcurrency: 20
              handleResultHandleResumeEvent-in-0:
                consumer:
                  maxConcurrency: 10
              resultHandleTaskResume-out-0:
                consumer:
                  maxConcurrency: 10
              handleNotifyMsg-in-0:
                consumer:
                  maxConcurrency: 10
              notifyMsg-out-0:
                consumer:
                  maxConcurrency: 10
              handleCallbackMsg-in-0:
                consumer:
                  maxConcurrency: 10
              callback-out-0:
                consumer:
                  maxConcurrency: 10
              handleCrontabFanoutEvent-in-0:
                consumer:
                  maxConcurrency: 5
                  exchangeType: fanout
              crontabFanout-out-0:
                producer:
                  exchangeType: fanout
                consumer:
                  maxConcurrency: 5
                  exchangeType: fanout
              handleBackGroundTask-in-0:
                consumer:
                  maxConcurrency: 1
              handleAIChatOperationEvent-in-0:
                consumer:
                  maxConcurrency: 3
                  exchangeType: fanout
              aiChatOperationFanout-out-0:
                producer:
                  exchangeType: fanout
        function:
          definition: handleJobEvent;handleStepEvent;handleGseTaskEvent;handleResultHandleResumeEvent;handleNotifyMsg;handleCallbackMsg;busConsumer;handleCrontabFanoutEvent;handleBackGroundTask;handleAIChatOperationEvent
      datasource:
        job-manage:
          driver-class-name: {{ include "job.jdbcMysqlDriverClass" . }}
          type: com.zaxxer.hikari.HikariDataSource
          jdbc-url: {{ include "job.jdbcMysqlScheme" . }}://{{- include "job.mariadb.host" . }}:{{- include "job.mariadb.port" . }}/job_manage{{ include "job.mariadb.connection.properties" . }}
          username: {{ include "job.mariadb.username" . }}
          {{- if .Values.externalMariaDB.existingPasswordSecret }}
          password: {{ .Values.externalMariaDB.existingPasswordKey | default "mariadb-password" | printf "${%s}" }}
          {{- else }}
          password: ${mariadb-password}
          {{- end }}
          maximum-pool-size: 100
          minimum-idle: 20
          idle-timeout: 600000
          poolName: "job-manage"
          validationTimeout: 5000
        {{- if .Values.executeConfig.mysql.standalone.enabled }}
        job-execute:
          driver-class-name: {{ include "job.jdbcMysqlDriverClass" . }}
          type: com.zaxxer.hikari.HikariDataSource
          jdbc-url: {{ include "job.jdbcMysqlScheme" . }}://{{- include "job.mariadb.host" . }}:{{- include "job.mariadb.port" . }}/job_execute{{ include "job.mariadb.connection.properties" . }}
          username: {{ include "job.mariadb.username" . }}
          {{- if .Values.externalMariaDB.existingPasswordSecret }}
          password: {{ .Values.externalMariaDB.existingPasswordKey | default "mariadb-password" | printf "${%s}" }}
          {{- else }}
          password: ${mariadb-password}
          {{- end }}
          maximum-pool-size: 100
          minimum-idle: 20
          idle-timeout: 600000
          poolName: "job-execute-standalone"
          validationTimeout: 5000
        {{- end }}
        {{- if .Values.executeConfig.mysql.verticalSharding.enabled }}
        {{- if .Values.executeConfig.mysql.verticalSharding.datasource }}
        {{- range $dsName, $ds := .Values.executeConfig.mysql.verticalSharding.datasource }}
        {{ $dsName }}:
            driverClassName: {{ include "job.jdbcMysqlDriverClass" . }}
            jdbcUrl: {{ $ds.jdbcUrl | quote }}
            username: {{ $ds.username | quote }}
            password: {{ $ds.password | quote }}
            maximumPoolSize: {{ $ds.maximumPoolSize | default 100 }}
            minimumIdle: {{ $ds.minimumIdle | default 20 }}
            idleTimeout: {{ $ds.idleTimeout | default 600000 }}
            poolName: {{ $ds.poolName | default "job-execute" }}
            validationTimeout: {{ $ds.validationTimeout | default 5000 }}
        {{- end }}
        {{- end }}
        {{- end }}
        job-crontab:
          driver-class-name: {{ include "job.jdbcMysqlDriverClass" . }}
          type: com.zaxxer.hikari.HikariDataSource
          {{- include "job.crontab.databaseConfig" . | nindent 10 }}
          maximum-pool-size: {{ .Values.crontabConfig.database.maxPoolSize }}
          minimum-idle: 20
          idle-timeout: 600000
          poolName: "job-crontab"
          validationTimeout: 5000
        job-file-gateway:
          driver-class-name: {{ include "job.jdbcMysqlDriverClass" . }}
          type: com.zaxxer.hikari.HikariDataSource
          jdbc-url: {{ include "job.jdbcMysqlScheme" . }}://{{- include "job.mariadb.host" . }}:{{- include "job.mariadb.port" . }}/job_file_gateway{{ include "job.mariadb.connection.properties" . }}
          username: {{ include "job.mariadb.username" . }}
          {{- if .Values.externalMariaDB.existingPasswordSecret }}
          password: {{ .Values.externalMariaDB.existingPasswordKey | default "mariadb-password" | printf "${%s}" }}
          {{- else }}
          password: ${mariadb-password}
          {{- end }}
          maximum-pool-size: 100
          minimum-idle: 20
          idle-timeout: 600000
          poolName: "job-file-gateway"
          validationTimeout: 5000
        job-analysis:
          driver-class-name: {{ include "job.jdbcMysqlDriverClass" . }}
          type: com.zaxxer.hikari.HikariDataSource
          jdbc-url: {{ include "job.jdbcMysqlScheme" . }}://{{- include "job.mariadb.host" . }}:{{- include "job.mariadb.port" . }}/job_analysis{{ include "job.mariadb.connection.properties" . }}
          username: {{ include "job.mariadb.username" . }}
          {{- if .Values.externalMariaDB.existingPasswordSecret }}
          password: {{ .Values.externalMariaDB.existingPasswordKey | default "mariadb-password" | printf "${%s}" }}
          {{- else }}
          password: ${mariadb-password}
          {{- end }}
          maximum-pool-size: 100
          minimum-idle: 20
          idle-timeout: 600000
          poolName: "job-analysis"
          validationTimeout: 5000
        job-backup:
          driver-class-name: {{ include "job.jdbcMysqlDriverClass" . }}
          type: com.zaxxer.hikari.HikariDataSource
          jdbc-url: {{ include "job.jdbcMysqlScheme" . }}://{{- include "job.mariadb.host" . }}:{{- include "job.mariadb.port" . }}/job_backup{{ include "job.mariadb.connection.properties" . }}
          username: {{ include "job.mariadb.username" . }}
          {{- if .Values.externalMariaDB.existingPasswordSecret }}
          password: {{ .Values.externalMariaDB.existingPasswordKey | default "mariadb-password" | printf "${%s}" }}
          {{- else }}
          password: ${mariadb-password}
          {{- end }}
          maximum-pool-size: 100
          minimum-idle: 20
          idle-timeout: 600000
          poolName: "job-backup"
          validationTimeout: 5000
        {{- /*
          backup archive execute 数据源说明（轻量化模式）：
          - standalone 模式：backup archive 使用的 job-execute 数据源与 execute 服务自身的同名，
            在轻量化模式下 execute 服务已渲染该数据源，backup 直接复用，无需重复渲染。
          - vertical_sharding 模式：backup archive 使用独立的数据源名称（如 job-execute-archive-hot-vertical-a/b/c），
            与 execute 服务自身的数据源名称不同，需要单独渲染。
        */ -}}
        {{- if and .Values.backupConfig.archive.execute.enabled (eq .Values.backupConfig.archive.execute.mariadb.dataSourceMode "vertical_sharding") }}
        {{- range $dsName, $ds := .Values.backupConfig.archive.execute.mariadb.verticalSharding.datasource }}
        {{ $dsName }}:
            driverClassName: {{ include "job.jdbcMysqlDriverClass" . }}
            jdbcUrl: {{ $ds.jdbcUrl | quote }}
            username: {{ $ds.username | quote }}
            password: {{ $ds.password | quote }}
            maximumPoolSize: {{ $ds.maximumPoolSize | default 100 }}
            minimumIdle: {{ $ds.minimumIdle | default 20 }}
            idleTimeout: {{ $ds.idleTimeout | default 600000 }}
            poolName: {{ $ds.poolName | default "job-execute" }}
            validationTimeout: {{ $ds.validationTimeout | default 5000 }}
        {{- end }}
        {{- end }}
        {{- if and .Values.backupConfig.archive.execute.enabled (or (eq .Values.backupConfig.archive.execute.mode "backupThenDelete") (eq .Values.backupConfig.archive.execute.mode "backupOnly")) }}
        job-execute-archive:
          driver-class-name: {{ include "job.jdbcMysqlDriverClass" . }}
          type: com.zaxxer.hikari.HikariDataSource
          jdbc-url: {{ include "job.jdbcMysqlScheme" . }}://{{ .Values.backupConfig.archive.mariadb.host }}:{{ .Values.backupConfig.archive.mariadb.port }}/job_execute{{ include "job.backup.archive.mariadb.connection.properties" . }}
          username: {{ .Values.backupConfig.archive.mariadb.username }}
          password: ${archive-mariadb-password}
          maximum-pool-size: 10
          minimum-idle: 2
          idle-timeout: 6000
          poolName: "job-execute-archive"
          validationTimeout: 5000
        {{- end }}
        {{- if and .Values.backupConfig.archive.executeLog.enabled (or (eq .Values.backupConfig.archive.executeLog.mode "deleteOnly") (eq .Values.backupConfig.archive.executeLog.mode "backupThenDelete")) }}
        job-execute-mongodb:
          uri: {{ include "job.mongodb.connect.uri" . | quote }}
          database: "joblog"
        {{- end }}
        {{- if .Values.executeConfig.leaf.enabled }}
        leaf:
          driver-class-name: {{ include "job.jdbcMysqlDriverClass" . }}
          type: com.zaxxer.hikari.HikariDataSource
          jdbc-url: {{ include "job.jdbcMysqlScheme" . }}://{{- include "job.mariadb.host" . }}:{{- include "job.mariadb.port" . }}/job_leaf{{ include "job.mariadb.connection.properties" . }}
          username: {{ include "job.mariadb.username" . }}
          {{- if .Values.externalMariaDB.existingPasswordSecret }}
          password: {{ .Values.externalMariaDB.existingPasswordKey | default "mariadb-password" | printf "${%s}" }}
          {{- else }}
          password: ${mariadb-password}
          {{- end }}
          maximum-pool-size: 50
          minimum-idle: 10
          idle-timeout: 600000
          poolName: "job-leaf"
          validationTimeout: 5000
        {{- end }}
      data:
        redis:
          {{- include "job.redis.config" . | indent 10 }}
          database: 0
          lettuce:
            pool:
              min-idle: 5
              max-idle: 10
              max-active: 20
              max-wait: 10ms
            shutdown-timeout: 100ms
        mongodb:
          uri: {{ include "job.mongodb.connect.uri" . | quote }}
          database: "joblog"
      quartz:
        job-store-type: MEMORY
        properties:
          org:
            quartz:
              jobStore:
                class: org.quartz.simpl.RAMJobStore
                misfireThreshold: 60000
              plugin:
                shutdownhook:
                  class: org.quartz.plugins.management.ShutdownHookPlugin
                  cleanShutdown: true
                triggHistory:
                  class: org.quartz.plugins.history.LoggingJobHistoryPlugin
              scheduler:
                # 调度器实例名称
                instanceName: quartz-scheduler
                # 调度器实例编号自动生成
                instanceId: AUTO
                skipUpdateCheck: true
                batchTriggerAcquisitionMaxCount: {{ .Values.crontabConfig.quartz.scheduler.batchTriggerAcquisitionMaxCount }}
              threadPool:
                class: org.quartz.simpl.SimpleThreadPool
                threadCount: {{ .Values.crontabConfig.quartz.threadPool.threadCount }}

    ## 其他框架组件配置 ##
    server:
      port: {{ .Values.assembleConfig.containerPort }}
    feign:
      {{- toYaml .Values.assembleConfig.feign | nindent 6 }}

    ## Job 配置 ##
    job:
      gateway:
        login-exemption:
          enabled: {{ .Values.gatewayConfig.loginExemption.enabled | default false }}
          default-user: {{ .Values.gatewayConfig.loginExemption.defaultUser | default "admin" }}
        csrf-check:
          enabled: {{ .Values.gatewayConfig.csrfCheck.enabled }}
        customAccessLog:
          enabled: {{ .Values.gatewayConfig.customAccessLog.enabled }}
      bkApiGateway:
        enabled: {{ .Values.bkApiGatewayConfig.enabled | default false }}
        gatewayName: {{ .Values.bkApiGatewayConfig.gatewayName | default "bk-job" }}
        jwtPublicKey:
          get:
            failPolicy: {{ .Values.bkApiGatewayConfig.jwtPublicKey.failPolicy | default "retry" }}
      backup:
        storage-backend: {{ .Values.backupConfig.storageBackend }}
        artifactory:
          repo: {{ .Values.backupConfig.artifactory.repo }}
        archive:  
          {{- toYaml .Values.backupConfig.archive | nindent 10 }}
      logsvr:
        mongodb:
          shard:
            enabled: {{ include "job.mongodb.useShardingCluster" . }}
      manage:
        sync:
          app:
            enabled: {{ .Values.manageConfig.sync.app.enabled }}
          host:
            enabled: {{ .Values.manageConfig.sync.host.enabled }}
          resource:
            watch:
              enabled: {{ .Values.manageConfig.sync.resource.watch.enabled }}
          hostEvent:
            handlerNum: {{ .Values.manageConfig.sync.hostEvent.handlerNum }}
        background-task:
          {{- toYaml .Values.manageConfig.backGroundTask | nindent 10 }}
        notify:
          default:
            channels:
              available: mail,weixin,rtx
      execute:
        # 执行日志导出产生的临时文件相关配置        
        log-export:
          storage-backend: {{ .Values.executeConfig.logExport.storageBackend }}
          artifactory:
            repo: {{ .Values.executeConfig.logExport.artifactory.repo }}
        file:
          distribute:
            root-path: {{ .Values.fileDistribute.hostPath }}/local
        scriptTask:
          query:
            contentSizeLimit: {{ .Values.executeConfig.scriptTask.query.contentSizeLimit }}
        iam:
          {{- toYaml .Values.executeConfig.iam | nindent 10 }}
        check-callback-url:
          {{- toYaml .Values.executeConfig.checkCallbackUrl | nindent 10 }}
        result:
          handle:
            {{- toYaml .Values.executeConfig.result.handle | nindent 12 }}
          {{- if .Values.executeConfig.result.pollingStrategy }}
          polling-strategy:
            {{- toYaml .Values.executeConfig.result.pollingStrategy | nindent 12 }}
          {{- end }}
        openapi:
          {{- toYaml .Values.executeConfig.openapi | nindent 10 }}
        taskTimeout:
          {{- toYaml .Values.executeConfig.taskTimeout | nindent 10}}
        taskHistoryQuery:
          {{- toYaml .Values.executeConfig.taskHistoryQuery | nindent 10}}
      crontab:
        notification-policy:
          failed:
            start:
              begin: {{ .Values.crontabConfig.notificationPolicy.failed.start.begin | default 1 }}
              frequency: {{ .Values.crontabConfig.notificationPolicy.failed.start.frequency | default 5 }}
              total: {{ .Values.crontabConfig.notificationPolicy.failed.start.total | default -1 }}
      file-gateway:
        reDispatch:
          {{- toYaml .Values.fileGatewayConfig.reDispatch | nindent 10 }}
        worker-tags:
          white: {{ .Values.fileGatewayConfig.workerTags.white }}
          black: {{ .Values.fileGatewayConfig.workerTags.black }}
    {{- $mysql := merge .Values.executeConfig.mysql .Values.assembleConfig.mysql }}
    mysql:
      {{- toYaml $mysql | nindent 6 }}
    idGen:
      type: {{ .Values.executeConfig.idGen.type }}
      migration:
        enabled: {{ .Values.executeConfig.idGen.migration.enabled }}
    {{ if .Values.executeConfig.leaf.enabled }}
    # 分布式 ID （leaf 组件配置)
    leaf:
      enabled: true
      segment:
        allocStrategyDaoBeanName: jooqLeafIdAllocator
        enable: true
        url: {{ include "job.jdbcMysqlScheme" . }}://{{- include "job.mariadb.host" . }}:{{- include "job.mariadb.port" . }}/job_leaf{{ include "job.mariadb.connection.properties" . }}
        username: {{ include "job.mariadb.username" . }}
        {{- if .Values.externalMariaDB.existingPasswordSecret }}
        password: {{ .Values.externalMariaDB.existingPasswordKey | default "mariadb-password" | printf "${%s}" }}
        {{- else }}
        password: ${mariadb-password}
        {{- end }}
      snowflake:
        enable: false
      name: job-leaf
    {{- end }}
    bk:
      doc:
        root: {{ .Values.bkDocsCenterUrl }}
      feedback:
        root: {{ .Values.bkFeedBackUrl }}
      sharedResUrl: {{ .Values.bkSharedResUrl }}
      sharedBaseJsPath: {{ .Values.bkSharedBaseJsPath }}
    ai:
      {{- toYaml .Values.analysisConfig.ai | nindent 6 }}
    deploy:
      mode: lite
    externalGseAgent:
      enabled: {{ .Values.externalGseAgent.enabled | default false }}
      hosts:
        {{ toYaml .Values.externalGseAgent.hosts | nindent 8 }}
    tls:
      # 连接Redis使用的TLS配置
      redis:
        {{- include "job.redis.tls" . | nindent 8 }}
      # 连接MongoDB使用的TLS配置
      mongodb:
        {{- include "job.mongodb.tls" . | nindent 8 }}
{{- end }}
